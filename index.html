<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📈 股票看盤 Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e17;
            --bg-card: #111827;
            --bg-card-hover: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
            --border-color: #374151;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, #1e1e2e 0%, var(--bg-dark) 100%);
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .time-display {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .market-status {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .market-open {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .market-closed {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        /* Main Content */
        .main-content {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 1rem;
            padding: 1rem 2rem;
            max-width: 1800px;
            margin: 0 auto;
        }

        /* Watchlist Sidebar */
        .watchlist-panel {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 1rem;
            height: fit-content;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
        }

        .watchlist-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .watchlist-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .add-stock-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .add-stock-btn:hover {
            background: #2563eb;
            transform: translateY(-1px);
        }

        .watchlist-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid transparent;
        }

        .watchlist-item:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-color);
        }

        .watchlist-item.active {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        .stock-info {
            flex: 1;
        }

        .stock-symbol {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stock-name {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.125rem;
        }

        .stock-price-info {
            text-align: right;
        }

        .stock-price {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .stock-change {
            font-size: 0.75rem;
            margin-top: 0.125rem;
        }

        .stock-change.up {
            color: var(--accent-green);
        }

        .stock-change.down {
            color: var(--accent-red);
        }

        .delete-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0.25rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .watchlist-item:hover .delete-btn {
            opacity: 1;
        }

        .delete-btn:hover {
            color: var(--accent-red);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            gap: 1rem;
        }

        /* Price Card */
        .price-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 1.5rem;
        }

        .price-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .current-stock {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }

        .current-symbol {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .current-name {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .current-price {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0.5rem 0;
        }

        .current-change {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.1rem;
        }

        .change-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .change-badge.up {
            background: rgba(16, 185, 129, 0.2);
            color: var(--accent-green);
        }

        .change-badge.down {
            background: rgba(239, 68, 68, 0.2);
            color: var(--accent-red);
        }

        /* Chart Container */
        .chart-container {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 1rem;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border-color);
        }

        .chart-title {
            font-weight: 600;
        }

        .chart-controls {
            display: flex;
            gap: 0.5rem;
        }

        .chart-btn {
            padding: 0.375rem 0.75rem;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .chart-btn:hover {
            background: var(--bg-card-hover);
            color: var(--text-primary);
        }

        .chart-btn.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: white;
        }

        #chart {
            width: 100%;
            height: 400px;
        }

        /* Indicators Panel */
        .indicators-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        .indicator-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 1rem;
        }

        .indicator-title {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .indicator-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .indicator-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        .indicator-value.green { color: var(--accent-green); }
        .indicator-value.red { color: var(--accent-red); }
        .indicator-value.yellow { color: var(--accent-yellow); }
        .indicator-value.blue { color: var(--accent-blue); }
        .indicator-value.purple { color: var(--accent-purple); }

        /* RSI Gauge */
        .rsi-bar {
            height: 8px;
            background: linear-gradient(90deg, var(--accent-green) 0%, var(--accent-yellow) 50%, var(--accent-red) 100%);
            border-radius: 4px;
            margin-top: 0.5rem;
            position: relative;
        }

        .rsi-marker {
            position: absolute;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }

        .rsi-labels {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }

        /* Add Stock Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 1.5rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid var(--border-color);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.5rem;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .input-group {
            margin-bottom: 1rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .input-field {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-dark);
            color: var(--text-primary);
            font-size: 1rem;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--accent-blue);
        }

        .submit-btn {
            width: 100%;
            padding: 0.75rem;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #2563eb;
        }

        /* Quick Add Chips */
        .quick-add {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .quick-chip {
            padding: 0.375rem 0.75rem;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 9999px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-chip:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-secondary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .watchlist-panel {
                max-height: 300px;
            }
        }

        @media (max-width: 640px) {
            .header {
                padding: 1rem;
            }

            .main-content {
                padding: 1rem;
            }

            .current-price {
                font-size: 2rem;
            }
        }

        /* Loading State */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid var(--border-color);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Market Stats */
        .market-stats {
            display: flex;
            gap: 2rem;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .stat-value {
            font-size: 0.95rem;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <div class="logo">📈 股票看盤</div>
        </div>
        <div class="header-right">
            <div class="time-display" id="timeDisplay">--:--:--</div>
            <div class="market-status market-closed" id="marketStatus">美股已收盤</div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Watchlist Sidebar -->
        <aside class="watchlist-panel">
            <div class="watchlist-header">
                <h2 class="watchlist-title">自選股</h2>
                <button class="add-stock-btn" onclick="openAddModal()">+ 添加</button>
            </div>
            <div class="watchlist" id="watchlist">
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <p>點擊「添加」加入自選股</p>
                </div>
            </div>
        </aside>

        <!-- Dashboard Grid -->
        <div class="dashboard-grid">
            <!-- Current Price Card -->
            <div class="price-card">
                <div class="price-card-header">
                    <div class="current-stock">
                        <div class="current-symbol" id="currentSymbol">AAPL</div>
                        <div class="current-name" id="currentName">Apple Inc.</div>
                    </div>
                    <div class="market-stats">
                        <div class="stat-item">
                            <span class="stat-label">開盤</span>
                            <span class="stat-value" id="statOpen">--</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">最高</span>
                            <span class="stat-value" id="statHigh">--</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">最低</span>
                            <span class="stat-value" id="statLow">--</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">成交量</span>
                            <span class="stat-value" id="statVolume">--</span>
                        </div>
                    </div>
                </div>
                <div class="current-price" id="currentPrice">$0.00</div>
                <div class="current-change">
                    <span id="priceChange">+$0.00</span>
                    <span class="change-badge up" id="changeBadge">+0.00%</span>
                </div>
            </div>

            <!-- Chart Container -->
            <div class="chart-container">
                <div class="chart-header">
                    <h3 class="chart-title">K線圖 & 技術分析</h3>
                    <div class="chart-controls">
                        <button class="chart-btn active" data-range="1d" onclick="changeRange('1d')">1天</button>
                        <button class="chart-btn" data-range="5d" onclick="changeRange('5d')">5天</button>
                        <button class="chart-btn active" data-range="1mo" onclick="changeRange('1mo')">1月</button>
                        <button class="chart-btn" data-range="3mo" onclick="changeRange('3mo')">3月</button>
                        <button class="chart-btn" data-range="6mo" onclick="changeRange('6mo')">6月</button>
                        <button class="chart-btn" data-range="1y" onclick="changeRange('1y')">1年</button>
                    </div>
                </div>
                <div id="chart"></div>
            </div>

            <!-- Indicators Grid -->
            <div class="indicators-grid">
                <div class="indicator-card">
                    <div class="indicator-title">MA 5</div>
                    <div class="indicator-value blue" id="ma5">--</div>
                    <div class="indicator-label">5日均線</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">MA 20</div>
                    <div class="indicator-value blue" id="ma20">--</div>
                    <div class="indicator-label">20日均線</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">RSI (14)</div>
                    <div class="indicator-value" id="rsi">--</div>
                    <div class="rsi-bar">
                        <div class="rsi-marker" id="rsiMarker" style="left: 50%"></div>
                    </div>
                    <div class="rsi-labels">
                        <span>超賣 30</span>
                        <span>超買 70</span>
                    </div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">MACD</div>
                    <div class="indicator-value purple" id="macd">--</div>
                    <div class="indicator-label" id="macdSignal">信號線: --</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">KDJ</div>
                    <div class="indicator-value" id="kdj">--</div>
                    <div class="indicator-label" id="kdjLabel">K: -- D: --</div>
                </div>
                <div class="indicator-card">
                    <div class="indicator-title">布林帶</div>
                    <div class="indicator-value yellow" id="bollinger">--</div>
                    <div class="indicator-label" id="bollingerLabel">上限: -- 下限: --</div>
                </div>
            </div>
        </div>
    </main>

    <!-- Add Stock Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">添加股票</h3>
                <button class="modal-close" onclick="closeAddModal()">×</button>
            </div>
            <div class="quick-add">
                <span class="quick-chip" onclick="quickAddStock('AAPL')">AAPL</span>
                <span class="quick-chip" onclick="quickAddStock('GOOGL')">GOOGL</span>
                <span class="quick-chip" onclick="quickAddStock('MSFT')">MSFT</span>
                <span class="quick-chip" onclick="quickAddStock('TSLA')">TSLA</span>
                <span class="quick-chip" onclick="quickAddStock('NVDA')">NVDA</span>
                <span class="quick-chip" onclick="quickAddStock('AMZN')">AMZN</span>
                <span class="quick-chip" onclick="quickAddStock('META')">META</span>
                <span class="quick-chip" onclick="quickAddStock('AMD')">AMD</span>
            </div>
            <div class="input-group">
                <label class="input-label">股票代碼</label>
                <input type="text" class="input-field" id="stockInput" placeholder="例如: AAPL" uppercase>
            </div>
            <button class="submit-btn" onclick="addStock()">確認添加</button>
        </div>
    </div>

    <script>
        // Global State
        let watchlist = JSON.parse(localStorage.getItem('stockWatchlist')) || ['AAPL', 'GOOGL', 'MSFT', 'TSLA'];
        let currentStock = localStorage.getItem('currentStock') || 'AAPL';
        let stockData = {};
        let chart = null;
        let currentRange = '1mo';
        let updateInterval = null;

        // Stock name mapping
        const stockNames = {
            'AAPL': 'Apple Inc.',
            'GOOGL': 'Alphabet Inc.',
            'MSFT': 'Microsoft Corp.',
            'TSLA': 'Tesla Inc.',
            'NVDA': 'NVIDIA Corp.',
            'AMZN': 'Amazon.com Inc.',
            'META': 'Meta Platforms Inc.',
            'AMD': 'AMD Inc.',
            'NFLX': 'Netflix Inc.',
            'INTC': 'Intel Corp.'
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            updateTime();
            setInterval(updateTime, 1000);
            updateMarketStatus();
            renderWatchlist();
            fetchAllStockData();
            initChart();

            // Update every 30 seconds
            updateInterval = setInterval(fetchAllStockData, 30000);
        });

        // Update time display
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('timeDisplay').textContent = timeStr;
        }

        // Update market status
        function updateMarketStatus() {
            const now = new Date();
            const utcHour = now.getUTCHours();
            const estHour = utcHour - 5; // EST is UTC-5

            let statusEl = document.getElementById('marketStatus');
            if (estHour >= 9.5 && estHour < 16) {
                statusEl.className = 'market-status market-open';
                statusEl.textContent = '美股交易中';
            } else {
                statusEl.className = 'market-status market-closed';
                statusEl.textContent = '美股已收盤';
            }
        }

        // Fetch stock data from API
        async function fetchStockData(symbol) {
            try {
                // Using Yahoo Finance API (free, no API key needed)
                const response = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=${currentRange}`);
                const data = await response.json();

                if (data.chart && data.chart.result && data.chart.result[0]) {
                    const result = data.chart.result[0];
                    const meta = result.meta;
                    const quote = result.indicators.quote[0];
                    const timestamps = result.timestamp;

                    // Calculate indicators
                    const closes = quote.close.filter(c => c !== null);
                    const highs = quote.high.filter(c => c !== null);
                    const lows = quote.low.filter(c => c !== null);
                    const volumes = quote.volume.filter(c => c !== null);

                    // Calculate MA
                    const ma5 = calculateMA(closes, 5);
                    const ma10 = calculateMA(closes, 10);
                    const ma20 = calculateMA(closes, 20);

                    // Calculate RSI
                    const rsi = calculateRSI(closes, 14);

                    // Calculate MACD
                    const macd = calculateMACD(closes);

                    // Calculate KDJ
                    const kdj = calculateKDJ(highs, lows, closes);

                    // Calculate Bollinger Bands
                    const bollinger = calculateBollinger(closes, 20, 2);

                    return {
                        symbol: symbol,
                        name: stockNames[symbol] || symbol,
                        price: meta.regularMarketPrice || 0,
                        change: meta.regularMarketChange || 0,
                        changePercent: meta.regularMarketChangePercent || 0,
                        open: meta.regularMarketOpen || 0,
                        high: meta.regularMarketDayHigh || 0,
                        low: meta.regularMarketDayLow || 0,
                        volume: meta.regularMarketVolume || 0,
                        previousClose: meta.chartPreviousClose || 0,
                        timestamp: new Date().toISOString(),
                        historical: timestamps.map((ts, i) => ({
                            date: new Date(ts * 1000).toISOString().split('T')[0],
                            open: quote.open[i],
                            high: quote.high[i],
                            low: quote.low[i],
                            close: quote.close[i],
                            volume: quote.volume[i]
                        })).filter(d => d.close !== null),
                        indicators: {
                            ma5, ma10, ma20,
                            rsi,
                            macd,
                            kdj,
                            bollinger
                        }
                    };
                }
            } catch (error) {
                console.error(`Error fetching ${symbol}:`, error);
            }
            return null;
        }

        // Fetch all stocks in watchlist
        async function fetchAllStockData() {
            for (const symbol of watchlist) {
                const data = await fetchStockData(symbol);
                if (data) {
                    stockData[symbol] = data;
                }
            }
            renderWatchlist();
            updateCurrentStockDisplay();
            updateChart();
            updateIndicators();
        }

        // Calculate Simple Moving Average
        function calculateMA(prices, period) {
            if (prices.length < period) return null;
            const slice = prices.slice(-period);
            return slice.reduce((a, b) => a + b, 0) / period;
        }

        // Calculate RSI
        function calculateRSI(prices, period = 14) {
            if (prices.length < period + 1) return null;

            let gains = 0, losses = 0;
            for (let i = prices.length - period; i < prices.length; i++) {
                const change = prices[i] - prices[i - 1];
                if (change > 0) gains += change;
                else losses -= change;
            }

            const avgGain = gains / period;
            const avgLoss = losses / period;

            if (avgLoss === 0) return 100;

            const rs = avgGain / avgLoss;
            return 100 - (100 / (1 + rs));
        }

        // Calculate EMA
        function calculateEMA(prices, period) {
            if (prices.length < period) return null;

            const multiplier = 2 / (period + 1);
            let ema = prices.slice(0, period).reduce((a, b) => a + b, 0) / period;

            for (let i = period; i < prices.length; i++) {
                ema = (prices[i] - ema) * multiplier + ema;
            }

            return ema;
        }

        // Calculate MACD
        function calculateMACD(prices) {
            if (prices.length < 26) return { line: null, signal: null, histogram: null };

            const ema12 = calculateEMA(prices, 12);
            const ema26 = calculateEMA(prices, 26);

            if (!ema12 || !ema26) return { line: null, signal: null, histogram: null };

            const macdLine = ema12 - ema26;

            // Calculate signal line (9-period EMA of MACD)
            const macdValues = [];
            for (let i = 26; i < prices.length; i++) {
                const e12 = calculateEMA(prices.slice(0, i + 1), 12);
                const e26 = calculateEMA(prices.slice(0, i + 1), 26);
                if (e12 && e26) macdValues.push(e12 - e26);
            }

            const signalLine = macdValues.length >= 9 ? calculateEMA(macdValues, 9) : null;
            const histogram = signalLine !== null ? macdLine - signalLine : null;

            return { line: macdLine, signal: signalLine, histogram };
        }

        // Calculate KDJ
        function calculateKDJ(highs, lows, closes, period = 9) {
            if (closes.length < period) return { k: null, d: null, j: null };

            const recentHighs = highs.slice(-period);
            const recentLows = lows.slice(-period);
            const recentCloses = closes.slice(-period);

            const highestHigh = Math.max(...recentHighs);
            const lowestLow = Math.min(...recentLows);
            const latestClose = recentCloses[recentCloses.length - 1];

            const rsv = highestHigh === lowestLow ? 50 :
                (latestClose - lowestLow) / (highestHigh - lowestLow) * 100;

            const k = 2 / 3 * 50 + 1 / 3 * rsv;
            const d = 2 / 3 * 50 + 1 / 3 * k;
            const j = 3 * k - 2 * d;

            return { k, d, j };
        }

        // Calculate Bollinger Bands
        function calculateBollinger(prices, period = 20, stdDev = 2) {
            if (prices.length < period) return { upper: null, middle: null, lower: null };

            const slice = prices.slice(-period);
            const middle = slice.reduce((a, b) => a + b, 0) / period;

            const variance = slice.reduce((sum, p) => sum + Math.pow(p - middle, 2), 0) / period;
            const std = Math.sqrt(variance);

            return {
                upper: middle + (std * stdDev),
                middle,
                lower: middle - (std * stdDev)
            };
        }

        // Render watchlist
        function renderWatchlist() {
            const container = document.getElementById('watchlist');

            if (watchlist.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <p>點擊「添加」加入自選股</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = watchlist.map(symbol => {
                const data = stockData[symbol];
                if (!data) {
                    return `
                        <div class="watchlist-item ${symbol === currentStock ? 'active' : ''}" onclick="selectStock('${symbol}')">
                            <div class="stock-info">
                                <div class="stock-symbol">${symbol}</div>
                                <div class="stock-name">加載中...</div>
                            </div>
                            <div class="stock-price-info">
                                <div class="stock-price loading">...</div>
                            </div>
                            <button class="delete-btn" onclick="event.stopPropagation(); deleteStock('${symbol}')">×</button>
                        </div>
                    `;
                }

                const isUp = data.change >= 0;
                return `
                    <div class="watchlist-item ${symbol === currentStock ? 'active' : ''}" onclick="selectStock('${symbol}')">
                        <div class="stock-info">
                            <div class="stock-symbol">${symbol}</div>
                            <div class="stock-name">${data.name}</div>
                        </div>
                        <div class="stock-price-info">
                            <div class="stock-price">$${data.price.toFixed(2)}</div>
                            <div class="stock-change ${isUp ? 'up' : 'down'}">
                                ${isUp ? '+' : ''}${data.change.toFixed(2)} (${isUp ? '+' : ''}${data.changePercent.toFixed(2)}%)
                            </div>
                        </div>
                        <button class="delete-btn" onclick="event.stopPropagation(); deleteStock('${symbol}')">×</button>
                    </div>
                `;
            }).join('');
        }

        // Select stock
        function selectStock(symbol) {
            currentStock = symbol;
            localStorage.setItem('currentStock', symbol);
            updateCurrentStockDisplay();
            updateChart();
            updateIndicators();
            renderWatchlist();
        }

        // Update current stock display
        function updateCurrentStockDisplay() {
            const data = stockData[currentStock];
            if (!data) return;

            document.getElementById('currentSymbol').textContent = data.symbol;
            document.getElementById('currentName').textContent = data.name;
            document.getElementById('currentPrice').textContent = `$${data.price.toFixed(2)}`;

            const changeEl = document.getElementById('priceChange');
            const badgeEl = document.getElementById('changeBadge');

            const isUp = data.change >= 0;
            changeEl.textContent = `${isUp ? '+' : ''}$${data.change.toFixed(2)}`;
            changeEl.style.color = isUp ? '#10b981' : '#ef4444';

            badgeEl.textContent = `${isUp ? '+' : ''}${data.changePercent.toFixed(2)}%`;
            badgeEl.className = `change-badge ${isUp ? 'up' : 'down'}`;

            document.getElementById('statOpen').textContent = `$${data.open.toFixed(2)}`;
            document.getElementById('statHigh').textContent = `$${data.high.toFixed(2)}`;
            document.getElementById('statLow').textContent = `$${data.low.toFixed(2)}`;
            document.getElementById('statVolume').textContent = formatVolume(data.volume);
        }

        // Format volume
        function formatVolume(vol) {
            if (vol >= 1e9) return (vol / 1e9).toFixed(2) + 'B';
            if (vol >= 1e6) return (vol / 1e6).toFixed(2) + 'M';
            if (vol >= 1e3) return (vol / 1e3).toFixed(2) + 'K';
            return vol.toString();
        }

        // Initialize Chart
        function initChart() {
            chart = echarts.init(document.getElementById('chart'));
            chart.showLoading();

            window.addEventListener('resize', () => {
                chart.resize();
            });
        }

        // Update chart
        function updateChart() {
            const data = stockData[currentStock];
            if (!data || !data.historical || data.historical.length === 0) {
                chart.showLoading();
                return;
            }

            chart.hideLoading();

            const historical = data.historical;

            // Prepare candlestick data
            const candlestickData = historical.map(d => [d.open, d.close, d.low, d.high]);
            const dates = historical.map(d => d.date);
            const volumes = historical.map(d => d.volume);

            // Calculate MA overlays
            const closes = historical.map(d => d.close);
            const ma5Data = [];
            const ma20Data = [];

            for (let i = 0; i < closes.length; i++) {
                ma5Data.push(i >= 4 ? calculateMA(closes.slice(0, i + 1), 5) : '-');
                ma20Data.push(i >= 19 ? calculateMA(closes.slice(0, i + 1), 20) : '-');
            }

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    axisPointer: { type: 'cross' },
                    backgroundColor: 'rgba(17, 24, 39, 0.95)',
                    borderColor: '#374151',
                    textStyle: { color: '#f9fafb' }
                },
                legend: {
                    data: ['K線', 'MA5', 'MA20'],
                    textStyle: { color: '#9ca3af' },
                    top: 0
                },
                grid: [
                    { left: '10%', right: '8%', top: '10%', height: '60%' },
                    { left: '10%', right: '8%', top: '75%', height: '15%' }
                ],
                xAxis: [
                    {
                        type: 'category',
                        data: dates,
                        gridIndex: 0,
                        axisLine: { lineStyle: { color: '#374151' } },
                        axisLabel: { color: '#9ca3af' }
                    },
                    {
                        type: 'category',
                        data: dates,
                        gridIndex: 1,
                        axisLine: { lineStyle: { color: '#374151' } },
                        axisLabel: { show: false }
                    }
                ],
                yAxis: [
                    {
                        scale: true,
                        gridIndex: 0,
                        axisLine: { lineStyle: { color: '#374151' } },
                        axisLabel: { color: '#9ca3af' },
                        splitLine: { lineStyle: { color: '#1f2937' } }
                    },
                    {
                        scale: true,
                        gridIndex: 1,
                        axisLine: { lineStyle: { color: '#374151' } },
                        axisLabel: { color: '#9ca3af' },
                        splitLine: { show: false }
                    }
                ],
                dataZoom: [
                    { type: 'inside', xAxisIndex: [0, 1], start: 0, end: 100 },
                    { type: 'slider', xAxisIndex: [0, 1], start: 0, end: 100 }
                ],
                series: [
                    {
                        name: 'K線',
                        type: 'candlestick',
                        data: candlestickData,
                        itemStyle: {
                            color: '#10b981',
                            color0: '#ef4444',
                            borderColor: '#10b981',
                            borderColor0: '#ef4444'
                        }
                    },
                    {
                        name: 'MA5',
                        type: 'line',
                        data: ma5Data,
                        smooth: true,
                        lineStyle: { color: '#f59e0b', width: 1 },
                        symbol: 'none'
                    },
                    {
                        name: 'MA20',
                        type: 'line',
                        data: ma20Data,
                        smooth: true,
                        lineStyle: { color: '#8b5cf6', width: 1 },
                        symbol: 'none'
                    },
                    {
                        name: '成交量',
                        type: 'bar',
                        data: volumes,
                        xAxisIndex: 1,
                        yAxisIndex: 1,
                        itemStyle: {
                            color: (params) => {
                                const idx = params.dataIndex;
                                if (idx < 1) return '#9ca3af';
                                return historical[idx].close >= historical[idx].open ? '#10b981' : '#ef4444';
                            }
                        }
                    }
                ]
            };

            chart.setOption(option, true);
        }

        // Update indicators display
        function updateIndicators() {
            const data = stockData[currentStock];
            if (!data || !data.indicators) return;

            const { indicators } = data;

            // MA
            document.getElementById('ma5').textContent = indicators.ma5 ? indicators.ma5.toFixed(2) : '--';
            document.getElementById('ma20').textContent = indicators.ma20 ? indicators.ma20.toFixed(2) : '--';

            // RSI
            const rsiEl = document.getElementById('rsi');
            const rsiMarker = document.getElementById('rsiMarker');
            if (indicators.rsi) {
                rsiEl.textContent = indicators.rsi.toFixed(1);
                rsiEl.className = 'indicator-value ' + getRSIColor(indicators.rsi);
                rsiMarker.style.left = `${indicators.rsi}%`;
            } else {
                rsiEl.textContent = '--';
            }

            // MACD
            const macdEl = document.getElementById('macd');
            const macdSignalEl = document.getElementById('macdSignal');
            if (indicators.macd && indicators.macd.line !== null) {
                macdEl.textContent = indicators.macd.line.toFixed(2);
                macdEl.className = 'indicator-value purple';
                macdSignalEl.textContent = `信號線: ${indicators.macd.signal ? indicators.macd.signal.toFixed(2) : '--'}`;
            } else {
                macdEl.textContent = '--';
            }

            // KDJ
            const kdjEl = document.getElementById('kdj');
            const kdjLabelEl = document.getElementById('kdjLabel');
            if (indicators.kdj && indicators.kdj.k !== null) {
                kdjEl.textContent = indicators.kdj.j.toFixed(1);
                kdjEl.className = 'indicator-value ' + getKDJColor(indicators.kdj.k);
                kdjLabelEl.textContent = `K: ${indicators.kdj.k.toFixed(1)} D: ${indicators.kdj.d.toFixed(1)}`;
            } else {
                kdjEl.textContent = '--';
            }

            // Bollinger
            const bollingerEl = document.getElementById('bollinger');
            const bollingerLabelEl = document.getElementById('bollingerLabel');
            if (indicators.bollinger && indicators.bollinger.middle !== null) {
                bollingerEl.textContent = indicators.bollinger.middle.toFixed(2);
                bollingerLabelEl.textContent = `上限: ${indicators.bollinger.upper.toFixed(2)} 下限: ${indicators.bollinger.lower.toFixed(2)}`;
            } else {
                bollingerEl.textContent = '--';
            }
        }

        // Get RSI color
        function getRSIColor(rsi) {
            if (rsi > 70) return 'red';
            if (rsi < 30) return 'green';
            return 'yellow';
        }

        // Get KDJ color
        function getKDJColor(k) {
            if (k > 80) return 'red';
            if (k < 20) return 'green';
            return 'yellow';
        }

        // Change chart range
        function changeRange(range) {
            currentRange = range;

            // Update button states
            document.querySelectorAll('.chart-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.range === range);
            });

            fetchAllStockData();
        }

        // Modal functions
        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
            document.getElementById('stockInput').focus();
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('stockInput').value = '';
        }

        function quickAddStock(symbol) {
            addStockToList(symbol.toUpperCase());
            closeAddModal();
        }

        function addStock() {
            const input = document.getElementById('stockInput');
            const symbol = input.value.trim().toUpperCase();

            if (symbol) {
                addStockToList(symbol);
                closeAddModal();
            }
        }

        function addStockToList(symbol) {
            if (!watchlist.includes(symbol)) {
                watchlist.push(symbol);
                localStorage.setItem('stockWatchlist', JSON.stringify(watchlist));
                renderWatchlist();
                fetchAllStockData();
            }
        }

        function deleteStock(symbol) {
            watchlist = watchlist.filter(s => s !== symbol);
            localStorage.setItem('stockWatchlist', JSON.stringify(watchlist));

            if (currentStock === symbol && watchlist.length > 0) {
                selectStock(watchlist[0]);
            }

            renderWatchlist();
        }

        // Handle Enter key in modal
        document.getElementById('stockInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addStock();
            }
        });

        // Close modal on overlay click
        document.getElementById('addModal').addEventListener('click', (e) => {
            if (e.target.id === 'addModal') {
                closeAddModal();
            }
        });
    </script>
</body>
</html>
